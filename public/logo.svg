<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background with gradient -->
  <defs>
    <linearGradient id="signova-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect width="1024" height="1024" rx="226" fill="url(#signova-gradient)"/>
  
  <!-- Signature icon -->
  <g transform="translate(512, 512)">
    <!-- Cursive 'S' stroke -->
    <path d="M -80 -150 Q -120 -180 -100 -220 Q -80 -260 -40 -240 Q 0 -220 20 -180 Q 40 -140 20 -100 Q 0 -60 -40 -40 Q -80 -20 -120 0 Q -160 20 -180 60 Q -200 100 -180 140 Q -160 180 -120 200 Q -80 220 -40 200 Q 0 180 20 140" 
          stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Document lines (left) -->
    <line x1="-240" y1="80" x2="-140" y2="80" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <line x1="-240" y1="140" x2="-140" y2="140" stroke="white" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Document lines (right) -->
    <line x1="80" y1="80" x2="240" y2="80" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <line x1="80" y1="140" x2="240" y2="140" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <line x1="80" y1="200" x2="200" y2="200" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </g>
</svg>
